<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>高考志愿填报助手 - 张雪峰方法论</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 微信分享配置 -->
    <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- 顶部标题栏 -->
        <header class="chat-header">
            <div class="header-avatar">🎓</div>
            <div class="header-info">
                <h1>志愿填报助手</h1>
                <span class="subtitle">基于张雪峰方法论 · AI智能分析</span>
            </div>
        </header>

        <!-- 聊天消息区域 -->
        <div class="chat-messages" id="chatMessages">
            <!-- 消息会动态插入这里 -->
        </div>

        <!-- 快捷输入区域 -->
        <div class="quick-inputs" id="quickInputs">
            <!-- 快捷按钮会动态生成 -->
        </div>

        <!-- 输入区域 -->
        <div class="input-area">
            <textarea 
                id="userInput" 
                placeholder="输入你的信息或问题..." 
                rows="1"
                autofocus
            ></textarea>
            <button id="sendBtn" onclick="sendMessage()">
                <span>发送</span>
            </button>
        </div>
    </div>

    <!-- 加载提示 -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="loading-content">
            <div class="typing-indicator">
                <span></span><span></span><span></span>
            </div>
            <p>正在分析中...</p>
        </div>
    </div>

    <script src="js/zhang-xuefeng-prompt.js"></script>
    <script src="js/ai-engine.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
